version: '3.9'

services:
  # ── AgriSol Backend API ─────────────────────
  api:
    build:
      context: .
      target: development
    container_name: agrisol-api
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongo:27017/agrisol
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BULL_REDIS_HOST=redis
      - BULL_REDIS_PORT=6379
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
      - ./logs:/app/logs
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agrisol-network
    restart: unless-stopped

  # ── MongoDB ──────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: agrisol-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: agrisol_secret
      MONGO_INITDB_DATABASE: agrisol
    volumes:
      - mongo-data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/agrisol --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - agrisol-network

  # ── Redis ─────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: agrisol-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agrisol-network

  # ── MongoDB Admin UI ─────────────────────────
  mongo-express:
    image: mongo-express:latest
    container_name: agrisol-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: agrisol_secret
      ME_CONFIG_MONGODB_URL: mongodb://admin:agrisol_secret@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: agrisol123
    depends_on:
      - mongo
    networks:
      - agrisol-network
    profiles:
      - tools

  # ── Redis Commander ───────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: agrisol-redis-commander
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis
    networks:
      - agrisol-network
    profiles:
      - tools

  # ── AI Service (Placeholder) ─────────────────
  ai-service:
    image: python:3.11-slim
    container_name: agrisol-ai
    ports:
      - "8001:8001"
    volumes:
      - ./ai-service:/app
    working_dir: /app
    command: >
      sh -c "pip install fastapi uvicorn pillow && uvicorn main:app --host 0.0.0.0 --port 8001"
    networks:
      - agrisol-network
    profiles:
      - ai

volumes:
  mongo-data:
    driver: local
  redis-data:
    driver: local

networks:
  agrisol-network:
    driver: bridge
